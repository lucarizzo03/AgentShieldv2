version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: agentshield
      POSTGRES_USER: agentshield
      POSTGRES_PASSWORD: agentshield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data:

